        .q-pulse-dot { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: q-pulse 2s infinite; }
        @keyframes q-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .q-status-txt { font-family: "Poppins", sans-serif; font-size: 9px; font-weight: 700; color: var(--primary); letter-spacing: 1px; }

        .editorial-card:hover { border-color: var(--primary); transform: translateY(-10px); box-shadow: 0 30px 60px rgba(23, 59, 108, 0.08); }

        .card-num { font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 700; color: var(--primary); margin-bottom: 25px; display: block; letter-spacing: 2px; }
        .card-title { font-family: 'Raleway', sans-serif; font-size: 2.2rem; font-weight: 800; color: var(--text-dark); margin-bottom: 20px; line-height: 1.1; }
        .card-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 30px; }
        .tag { font-family: 'Poppins', sans-serif; font-size: 9px; font-weight: 700; color: var(--text-muted); border: 1px solid var(--border-light); padding: 4px 10px; text-transform: uppercase; letter-spacing: 1px; }
        .editorial-card:hover .tag { border-color: var(--primary); color: var(--primary); }

        .card-desc { font-family: 'Open Sans', sans-serif; font-size: 1rem; color: #555; line-height: 1.8; margin-bottom: 40px; }

        .card-actions { display: flex; align-items: center; gap: 25px; border-top: 1px solid var(--border-light); padding-top: 30px; }
        .action-link { font-family: 'Poppins', sans-serif; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--text-dark); display: flex; align-items: center; gap: 10px; transition: 0.3s; }
        .action-link:hover { color: var(--primary); transform: translateX(5px); }

        /* Dynamic Stats Mockup */
        .card-stats { position: absolute; right: 40px; top: 40px; display: flex; flex-direction: column; align-items: flex-end; gap: 5px; opacity: 0.3; transition: 0.4s; }
        .editorial-card:hover .card-stats { opacity: 1; }
        .stat-bar { height: 2px; background: var(--primary); margin-bottom: 4px; }

        @media (max-width: 1199px) {
            #header.quantum-sidebar, #footer { left: -300px !important; }
            #main { margin-left: 0 !important; }
            .mobile-nav-active #header.quantum-sidebar, .mobile-nav-active #footer { left: 0 !important; }
            .mobile-nav-toggle { color: var(--primary) !important; position: fixed; top: 15px; right: 15px; z-index: 9999; font-size: 30px; cursor: pointer; }

    <script>
        const projectData = [
            {
                num: "01",
                title: "WhatsApp Chat Parser",
                tags: ["Python", "Streamlit", "NLTK", "Regex"],
                desc: "A high-performance analysis engine that transforms raw WhatsApp exports into interactive behavioral insights. Features include message frequency heatmaps, word cloud generation, and emoji sentiment distribution.",
                demoUrl: "https://marellasiva.netlify.app/",
                githubUrl: "https://github.com/marellasiva/WhatsApp-Chat-Parser.git"
            },
            {
                num: "02",
                title: "Smart Assistive Navigation System",
                tags: ["Python", "Computer Vision", "TensorFlow", "IoT"],
                desc: "A real-time obstacle detection and navigation assistant for the visually impaired. Utilizes depth sensing and spatial audio feedback to provide seamless environmental awareness.",
                demoUrl: "https://marella222.netlify.app/",
                githubUrl: "https://github.com/marellasiva/Smart-Assistive-Navigation-System.git"
            },
            {
                num: "03",
                title: "E-Commerce Platform",
                tags: ["React", "Node.js", "MongoDB", "Redux"],
                desc: "A full-stack editorial commerce experience featuring dynamic product filtering, secure checkout integration, and a sophisticated administrative dashboard.",
                demoUrl: "https://agent-69c50b4ead09d0a949e7b--dapper-blini-9a9984.netlify.app/",
                githubUrl: "https://github.com/marellasiva/E-commerce.git"
            },
            {
                num: "04",
                title: "Twitter Clone",
                tags: ["React", "Firebase", "Tailwind CSS", "Framer Motion"],
                desc: "A high-fidelity social media replica featuring real-time feed updates, user authentication, and interactive tweet engagements with smooth cinematic transitions.",
                demoUrl: "https://sivamarella.netlify.app/",
                githubUrl: "https://github.com/marellasiva/twitter-clone.git"
            }

        ];

        function renderProjects() {
            const container = document.getElementById('project-container');
            container.innerHTML = projectData.map(p => {
                const isDemoAvailable = p.demoUrl && p.demoUrl !== "#";
                return `
                <div class="editorial-card" data-aos="fade-up">
                    <span class="card-num">${p.num}</span>
                    <h3 class="card-title">${p.title}</h3>
                    <div class="card-tags">
                        ${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}
                    </div>
                    <p class="card-desc">${p.desc}</p>
                    <div class="card-actions">
                        ${isDemoAvailable ?
                            `<a href="${p.demoUrl}" target="_blank" rel="noopener" class="action-link">Live Launch <i class="bi bi-arrow-up-right"></i></a>` :
                            `<a href="#" class="action-link" style="opacity: 0.5; cursor: not-allowed;" onclick="return false;">Coming Soon <i class="bi bi-clock"></i></a>`
                        }
                        <a href="${p.githubUrl}" target="_blank" class="action-link">System Repo <i class="bi bi-github"></i></a>
                    </div>
                    <div class="card-stats">
                        <div class="stat-bar" style="width: 20px;"></div>
                        <div class="stat-bar" style="width: 40px;"></div>
                        <div class="stat-bar" style="width: 15px;"></div>
                    </div>
                </div>
            `}).join('');

            // Initialize GLightbox for the dynamic content
            GLightbox({
                selector: '.glightbox',
                touchNavigation: true,
                loop: false,
                width: '90vw',
                height: '90vh'
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            renderProjects();
            AOS.init({ duration: 1000, once: true });
        });
    </script>
